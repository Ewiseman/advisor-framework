<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wealth Framework</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <h1 class="title">Wealth Framework</h1>
    <p class="subtitle">How we build, protect, and use wealth over time</p>

    <!-- Top Level -->
    <div class="top-row">
      <div class="box main">Build Wealth</div>
      <div class="box main">Protect Wealth</div>
      <div class="box main">Use Wealth</div>
    </div>

    <!-- Bottom Level -->
    <div class="bottom-row">

      <div class="column">
        <div class="box sub">Investment Management</div>
        <div class="box sub">Savings Strategy</div>
        <div class="box sub">Asset Allocation</div>
      </div>

      <div class="column">
        <div class="box sub">Insurance Planning</div>
        <div class="box sub">Tax Strategies</div>
        <div class="box sub">Risk Management</div>
      </div>

      <div class="column">
        <div class="box sub">Goals & Priorities</div>
        <div class="box sub">Income Planning</div>
        <div class="box sub">Distribution Strategy</div>
      </div>

    </div>

  </div>

</body>
</html>
